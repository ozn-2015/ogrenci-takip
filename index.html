<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci & Kurs Takip Sistemi (Muhasebe & CRM - V6)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2563eb; --bg: #f8fafc; --surface: #ffffff; --text: #1e293b;
            --border: #e2e8f0; --success: #10b981; --danger: #ef4444; 
            --secondary: #64748b; --info: #0284c7; --warning: #f59e0b;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 20px; }
        .panel { background: var(--surface); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid var(--border); height: fit-content; }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input, select { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 0.95rem; }
        button { background-color: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: background 0.2s; }
        button:hover { background-color: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; }
        
        .actions { display: flex; flex-wrap: wrap; gap: 4px; }
        .actions button { width: auto; padding: 6px 10px; font-size: 0.8rem; margin: 0; }
        .btn-edit { background-color: var(--info); } .btn-detail { background-color: var(--warning); color: #000; }
        .btn-wp { background-color: var(--success); } .btn-sms { background-color: #6366f1; }
        .btn-pdf { background-color: var(--danger); } .btn-delete { background-color: var(--secondary); }
        
        .backup-section { margin-top: 25px; padding-top: 20px; border-top: 2px dashed var(--border); }
        .btn-backup { background-color: #475569; margin-bottom: 8px; } .btn-restore { background-color: #0284c7; }
        .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: normal; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--surface); padding: 25px; border-radius: 12px; width: 85%; max-width: 950px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .close-modal { float: right; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: var(--secondary); margin-top: -10px; }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .history-box { border: 1px solid var(--border); padding: 15px; border-radius: 8px; background: #fafafa; }
        .history-list { max-height: 250px; overflow-y: auto; margin-top: 10px; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 5px; }
        .history-item { padding: 8px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        .history-item:hover { background-color: #f8fafc; }
        .btn-icon { background: none !important; border: none !important; color: var(--danger) !important; cursor: pointer; font-size: 1.2rem !important; padding: 0 5px !important; margin: 0 !important; width: auto !important; transition: transform 0.2s; }
        .btn-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h2 id="formTitle">Yeni Öğrenci Ekle</h2>
            <form id="studentForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Öğrenci Adı Soyadı</label>
                    <input type="text" id="adSoyad" required>
                </div>
                <div class="form-group">
                    <label>Ders</label>
                    <select id="ders">
                        <option>Matematik</option><option>Fizik</option><option>Kimya</option>
                        <option>Biyoloji</option><option>Türkçe</option><option>Tarih</option><option>Coğrafya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sınıf & Okul</label>
                    <input type="text" id="okul" placeholder="Örn: 10. Sınıf - Atatürk Lisesi">
                </div>
                <div class="form-group">
                    <label>Veli Adı (Anne/Baba)</label>
                    <input type="text" id="veliAd">
                </div>
                <div class="form-group">
                    <label>Veli Telefonu</label>
                    <input type="number" id="veliTel" placeholder="5551234567" required>
                </div>
                <div class="form-group">
                    <label>Ders Saat Ücreti (₺)</label>
                    <input type="number" id="saatUcreti" value="0">
                </div>
                <button type="submit" id="submitBtn">Öğrenciyi Kaydet</button>
                <button type="button" id="cancelEditBtn" style="background-color: var(--secondary); margin-top:5px; display:none;" onclick="clearForm()">Düzenlemeyi İptal Et</button>
            </form>

            <div class="backup-section">
                <h2>Veri Yönetimi & Yedekleme</h2>
                <button type="button" class="btn-backup" onclick="exportBackup()">Verileri Yedekle (.json)</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(event)">
                <button type="button" class="btn-restore" onclick="document.getElementById('importFile').click()">Yedekten Geri Yükle</button>
            </div>
        </div>

        <div class="panel">
            <h2>Öğrenci Listesi <span class="badge" id="studentCount">0 Öğrenci</span></h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>Ders</th>
                            <th>Finansal Durum</th>
                            <th>İşlenen Ders</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalStudentName" style="margin-top: 0; color: var(--primary);">Öğrenci Detayı</h3>
            <p id="modalStudentInfo" style="color: var(--secondary); font-size:0.9rem; border-bottom: 1px solid var(--border); padding-bottom: 10px;"></p>
            
            <div class="modal-grid">
                <div class="history-box">
                    <h4 style="margin-top: 0;">🗓️ Ders Katılım Geçmişi</h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="logKatilimTarih" style="flex: 2;">
                        <input type="number" id="logKatilimSaat" placeholder="Saat" value="1" style="flex: 1;" min="1" step="0.5">
                        <select id="logKatilimDurum" style="flex: 1.5;">
                            <option value="Geldi">Geldi</option>
                            <option value="Gelmedi">Gelmedi</option>
                        </select>
                        <button style="width: auto; padding:0 15px;" onclick="addAttendanceLog()">Ekle</button>
                    </div>
                    <div class="history-list" id="attendanceList"></div>
                </div>

                <div class="history-box">
                    <h4 style="margin-top: 0; display: flex; justify-content: space-between; align-items: center;">
                        <span>💰 Ödeme Geçmişi</span>
                        <span id="modalGuncelBorc" style="color: var(--danger); font-size: 1.1rem; border: 1px dashed var(--danger); padding: 3px 8px; border-radius: 6px;"></span>
                    </h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="logOdemeTarih" style="flex: 2;">
                        <input type="number" id="logOdemeMiktar" placeholder="Tutar ₺" style="flex: 1.5;">
                        <button style="width: auto; padding:0 15px; background-color: var(--success);" onclick="addPaymentLog()">Tahsil Et</button>
                    </div>
                    <div class="history-list" id="paymentList"></div>
                </div>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button class="btn-pdf" style="width: auto; padding: 12px 25px; font-size: 1.1rem;" onclick="generateAdvancedPDF()">📄 Kapsamlı PDF Raporu Üret</button>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('kursOgrencileri')) || [];
        let activeStudentIndex = -1;

        const studentForm = document.getElementById('studentForm');
        const tableBody = document.getElementById('studentTableBody');
        const studentCountBadge = document.getElementById('studentCount');

        // Para ve Tarih Formatlama Fonksiyonları
        function formatMoney(amount) {
            return new Intl.NumberFormat('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(amount) + ' ₺';
        }
        function formatDate(dateStr) {
            if(!dateStr) return '';
            return new Date(dateStr).toLocaleDateString('tr-TR', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        // Finansal Hesaplama Motoru
        function getStudentFinancials(student) {
            const saatUcreti = parseFloat(student.saatUcreti) || parseFloat(student.toplamUcret) || 0; // Eski verilerle uyumluluk
            let toplamGelinensaat = 0;
            
            (student.katilimlar || []).forEach(k => {
                if(k.durum === 'Geldi') {
                    toplamGelinensaat += (parseFloat(k.saat) || 1);
                }
            });
            
            const toplamDersUcreti = toplamGelinensaat * saatUcreti;
            
            let toplamOdenen = 0;
            (student.odemeler || []).forEach(o => {
                toplamOdenen += (parseFloat(o.miktar) || 0);
            });
            
            const guncelBorc = toplamDersUcreti - toplamOdenen;
            return { saatUcreti, toplamGelinensaat, toplamDersUcreti, toplamOdenen, guncelBorc };
        }

        studentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('editIndex').value);
            
            const studentData = {
                adSoyad: document.getElementById('adSoyad').value,
                ders: document.getElementById('ders').value,
                okul: document.getElementById('okul').value,
                veliAd: document.getElementById('veliAd').value,
                veliTel: document.getElementById('veliTel').value,
                saatUcreti: parseFloat(document.getElementById('saatUcreti').value) || 0,
                katilimlar: editIndex > -1 ? students[editIndex].katilimlar || [] : [],
                odemeler: editIndex > -1 ? students[editIndex].odemeler || [] : []
            };

            if (editIndex > -1) { students[editIndex] = studentData; } 
            else { students.push(studentData); }

            saveData(); renderTable(); clearForm();
        });

        function saveData() { localStorage.setItem('kursOgrencileri', JSON.stringify(students)); }

        function clearForm() {
            studentForm.reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitle').textContent = "Yeni Öğrenci Ekle";
            document.getElementById('submitBtn').textContent = "Öğrenciyi Kaydet";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        function editStudent(index) {
            const student = students[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('adSoyad').value = student.adSoyad;
            document.getElementById('ders').value = student.ders;
            document.getElementById('okul').value = student.okul;
            document.getElementById('veliAd').value = student.veliAd;
            document.getElementById('veliTel').value = student.veliTel;
            document.getElementById('saatUcreti').value = student.saatUcreti || student.toplamUcret || 0;

            document.getElementById('formTitle').textContent = "Öğrenci Kaydını Düzenle";
            document.getElementById('submitBtn').textContent = "Değişiklikleri Kaydet";
            document.getElementById('cancelEditBtn').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function renderTable() {
            tableBody.innerHTML = '';
            studentCountBadge.textContent = `${students.length} Öğrenci`;
            
            if (students.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--secondary); padding:30px;">Kayıtlı öğrenci yok.</td></tr>`;
                return;
            }

            students.forEach((student, index) => {
                const fin = getStudentFinancials(student);
                const bakiyeRenk = fin.guncelBorc > 0 ? 'var(--danger)' : 'var(--success)';

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${student.adSoyad}</strong><br><small>${student.okul || '-'}</small></td>
                    <td><span class="badge">${student.ders}</span></td>
                    <td>Borç: <strong style="color:${bakiyeRenk}">${formatMoney(fin.guncelBorc)}</strong></td>
                    <td>İşlenen: ${fin.toplamGelinensaat} Saat</td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" onclick="editStudent(${index})">📝 Düzenle</button>
                            <button class="btn-detail" onclick="openModal(${index})">📊 Hesap & Detay</button>
                            <button class="btn-wp" onclick="sendWP(${index})">WP</button>
                            <button class="btn-sms" onclick="sendSMS(${index})">SMS</button>
                            <button class="btn-delete" onclick="deleteStudent(${index})">Sil</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // --- DETAY PENCERESİ ---
        function openModal(index) {
            activeStudentIndex = index;
            const student = students[index];
            const fin = getStudentFinancials(student);
            
            document.getElementById('modalStudentName').textContent = `📊 ${student.adSoyad} - Detaylı Öğrenci Kartı`;
            document.getElementById('modalStudentInfo').textContent = `Veli: ${student.veliAd || '-'} (${student.veliTel}) | Ders Saat Ücreti: ${formatMoney(fin.saatUcreti)}`;
            
            const bugün = new Date().toISOString().slice(0,10);
            document.getElementById('logKatilimTarih').value = bugün;
            document.getElementById('logKatilimSaat').value = 1;
            document.getElementById('logOdemeTarih').value = bugün;
            document.getElementById('logOdemeMiktar').value = '';

            renderModalLists();
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

        function renderModalLists() {
            const student = students[activeStudentIndex];
            if (!student.katilimlar) student.katilimlar = [];
            if (!student.odemeler) student.odemeler = [];

            // Canlı Borç Güncellemesi
            const fin = getStudentFinancials(student);
            document.getElementById('modalGuncelBorc').textContent = `Kalan Borç: ${formatMoney(fin.guncelBorc)}`;

            student.katilimlar.sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
            student.odemeler.sort((a,b) => new Date(b.tarih) - new Date(a.tarih));

            const attList = document.getElementById('attendanceList');
            attList.innerHTML = '';
            student.katilimlar.forEach((k, idx) => {
                const saatVerisi = k.saat ? `${k.saat} Ders Saati` : '1 Ders Saati';
                attList.innerHTML += `
                    <div class="history-item">
                        <span>📅 ${formatDate(k.tarih)} - ${saatVerisi} <strong style="color:${k.durum === 'Geldi'?'var(--success)':'var(--danger)'}">${k.durum}</strong></span>
                        <button class="btn-icon" onclick="removeAttendance(${idx})">🗑️</button>
                    </div>`;
            });
            if(student.katilimlar.length === 0) attList.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:grey">Katılım kaydı yok.</div>';

            const payList = document.getElementById('paymentList');
            payList.innerHTML = '';
            student.odemeler.forEach((o, idx) => {
                payList.innerHTML += `
                    <div class="history-item">
                        <span>💰 ${formatDate(o.tarih)} Tarihinde: <strong>${formatMoney(o.miktar)}</strong></span>
                        <button class="btn-icon" onclick="removePayment(${idx})">🗑️</button>
                    </div>`;
            });
            if(student.odemeler.length === 0) payList.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:grey">Ödeme kaydı yok.</div>';
        }

        function removeAttendance(historyIndex) {
            if(confirm('Silmek istediğinize emin misiniz?')) {
                students[activeStudentIndex].katilimlar.splice(historyIndex, 1);
                saveData(); renderModalLists(); renderTable();
            }
        }

        function removePayment(historyIndex) {
            if(confirm('Tahsilatı silmek istediğinize emin misiniz?')) {
                students[activeStudentIndex].odemeler.splice(historyIndex, 1);
                saveData(); renderModalLists(); renderTable();
            }
        }

        function addAttendanceLog() {
            const tarih = document.getElementById('logKatilimTarih').value;
            const saat = parseFloat(document.getElementById('logKatilimSaat').value) || 1;
            const durum = document.getElementById('logKatilimDurum').value;
            if(!tarih) return;
            students[activeStudentIndex].katilimlar.push({ tarih, durum, saat });
            saveData(); renderModalLists(); renderTable();
        }

        function addPaymentLog() {
            const tarih = document.getElementById('logOdemeTarih').value;
            const miktar = parseFloat(document.getElementById('logOdemeMiktar').value);
            if(!tarih || isNaN(miktar)) return;
            students[activeStudentIndex].odemeler.push({ tarih, miktar });
            saveData(); renderModalLists(); renderTable();
            document.getElementById('logOdemeMiktar').value = '';
        }

        // --- İLETİŞİM FONKSİYONLARI ---
        function sendWP(index) {
            const student = students[index];
            const fin = getStudentFinancials(student);
            const mesaj = `Sayın ${student.veliAd},\n\nÖğrencimiz ${student.adSoyad}'ın kurs durumu:\nDers: ${student.ders}\nGüncel Borç Bakiyesi: ${formatMoney(fin.guncelBorc)}.\nDetaylı döküm için iletişime geçebilirsiniz.`;
            window.open(`https://wa.me/90${student.veliTel}?text=${encodeURIComponent(mesaj)}`, '_blank');
        }

        function sendSMS(index) {
            const student = students[index];
            const sortedKatilim = (student.katilimlar || []).sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
            const sonDurum = sortedKatilim.length > 0 ? (sortedKatilim[0].durum === 'Geldi' ? 'katilmistir' : 'KATILMAMISTIR') : 'bilgisi girilmistir';
            const tarih = sortedKatilim.length > 0 ? formatDate(sortedKatilim[0].tarih) : formatDate(new Date());
            
            const mesaj = `Sayin Veli, ogrenciniz ${student.adSoyad} ${tarih} tarihindeki ${student.ders} dersine ${sonDurum}. Bilgilerinize.`;
            window.location.href = `sms:+90${student.veliTel}?body=${encodeURIComponent(mesaj)}`;
        }

        // --- MÜKEMMEL HTML2PDF ÇIKTISI ---
        function generateAdvancedPDF() {
            const student = students[activeStudentIndex];
            const fin = getStudentFinancials(student);

            // Geçici bir HTML div oluşturup tasarlıyoruz
            const element = document.createElement('div');
            element.style.padding = '30px';
            element.style.fontFamily = 'Helvetica, Arial, sans-serif';
            element.style.color = '#000';
            
            let html = `
                <h1 style="text-align:center; font-size: 22px; color: #2563eb; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; margin-bottom: 5px;">KURS ÖĞRENCİ HAREKET RAPORU</h1>
                <p style="text-align:right; font-size: 12px; color: #64748b; margin-top: 0;">Rapor Tarihi: ${formatDate(new Date().toISOString())}</p>
                
                <h3 style="font-size: 16px; margin-top: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Öğrenci Bilgileri</h3>
                <table style="width:100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px;">
                    <tr>
                        <td style="padding: 5px 0;"><strong>Adı Soyadı:</strong> ${student.adSoyad}</td>
                        <td style="padding: 5px 0;"><strong>Branş / Ders:</strong> ${student.ders}</td>
                    </tr>
                    <tr>
                        <td style="padding: 5px 0;"><strong>Okul Bilgisi:</strong> ${student.okul || '-'}</td>
                        <td style="padding: 5px 0;"><strong>Veli İletişim:</strong> ${student.veliAd || '-'} (${student.veliTel})</td>
                    </tr>
                </table>

                <h3 style="font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Finansal Özet</h3>
                <div style="background-color: #f8fafc; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; border: 1px solid #e2e8f0;">
                    <div style="margin-bottom: 8px;"><strong>Ders Saat Ücreti:</strong> ${formatMoney(fin.saatUcreti)}</div>
                    <div style="margin-bottom: 8px;"><strong>Toplam Ders Karşılığı Ücret:</strong> ${formatMoney(fin.toplamDersUcreti)}</div>
                    <div style="margin-bottom: 8px;"><strong>Toplam Tahsil Edilen Ücret:</strong> ${formatMoney(fin.toplamOdenen)}</div>
                    <div style="margin-top: 12px; padding-top: 12px; border-top: 1px dashed #cbd5e1; font-size: 16px; color: #ef4444;">
                        <strong>Kalan Güncel Borç / Bakiye:</strong> ${formatMoney(fin.guncelBorc)}
                    </div>
                </div>

                <h3 style="font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Ders Katılım Listesi</h3>
                <ul style="list-style-type: none; padding: 0; font-size: 13px; margin-bottom: 20px;">
            `;
            
            let sortedKatilim = [...(student.katilimlar || [])].sort((a,b) => new Date(a.tarih) - new Date(b.tarih));
            sortedKatilim.forEach(k => {
                const saat = k.saat || 1;
                html += `<li style="padding: 6px 0; border-bottom: 1px solid #f1f5f9;">&#8226; <strong>${formatDate(k.tarih)}</strong> - ${saat} Ders Saati - <strong>${k.durum}</strong></li>`;
            });
            if(sortedKatilim.length === 0) html += '<li>Kayıt bulunamadı.</li>';
            
            html += `
                </ul>
                <h3 style="font-size: 16px; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px;">Ödeme Makbuz Hareketleri</h3>
                <ul style="list-style-type: none; padding: 0; font-size: 13px;">
            `;
            
            let sortedOdemeler = [...(student.odemeler || [])].sort((a,b) => new Date(a.tarih) - new Date(b.tarih));
            sortedOdemeler.forEach(o => {
                html += `<li style="padding: 6px 0; border-bottom: 1px solid #f1f5f9;">&#8226; <strong>${formatDate(o.tarih)}</strong> Tarihinde Tahsil Edilen: <strong>${formatMoney(o.miktar)}</strong></li>`;
            });
            if(sortedOdemeler.length === 0) html += '<li>Kayıt bulunamadı.</li>';
            
            html += `</ul>`;
            element.innerHTML = html;
            
            // html2pdf ayarları (A4 Kağıdı Formati)
            const opt = {
                margin:       15,
                filename:     `${student.adSoyad.replace(/\s+/g, '_')}_Rapor.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            
            html2pdf().set(opt).from(element).save();
        }

        function deleteStudent(index) {
            if(confirm('Bu ogrenciyi ve tum gecmisini silmek istediginize emin misiniz?')) {
                students.splice(index, 1); saveData(); renderTable();
            }
        }

        function exportBackup() {
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(students, null, 2));
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `kurs_otomasyon_yedek_${new Date().toISOString().slice(0,10)}.json`);
            link.click();
        }

        function importBackup(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    students = JSON.parse(e.target.result); saveData(); renderTable(); alert("Yedek başarıyla yüklendi!");
                } catch(err) { alert("Hatalı dosya!"); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        renderTable();
    </script>
</body>
</html>
