<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öğrenci & Kurs Takip Sistemi (Gelişmiş CRM - V4)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --secondary: #64748b;
            --info: #0284c7;
            --warning: #f59e0b;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 20px;
        }
        .container {
            max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 360px 1fr; gap: 20px;
        }
        .panel {
            background: var(--surface); padding: 20px; border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); border: 1px solid var(--border); height: fit-content;
        }
        h2 { margin-top: 0; font-size: 1.2rem; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input, select {
            width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 0.95rem;
        }
        button {
            background-color: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 6px;
            cursor: pointer; width: 100%; font-weight: bold; font-size: 1rem; transition: background 0.2s;
        }
        button:hover { background-color: #1d4ed8; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background-color: #f1f5f9; font-weight: 600; }
        
        .actions { display: flex; flex-wrap: wrap; gap: 4px; }
        .actions button { width: auto; padding: 6px 10px; font-size: 0.8rem; margin: 0; }
        
        .btn-edit { background-color: var(--info); }
        .btn-edit:hover { background-color: #0369a1; }
        .btn-detail { background-color: var(--warning); }
        .btn-detail:hover { background-color: #d97706; }
        .btn-wp { background-color: var(--success); }
        .btn-sms { background-color: #6366f1; }
        .btn-pdf { background-color: var(--danger); }
        .btn-delete { background-color: var(--secondary); }
        
        .backup-section { margin-top: 25px; padding-top: 20px; border-top: 2px dashed var(--border); }
        .btn-backup { background-color: #475569; margin-bottom: 8px; }
        .btn-restore { background-color: #0284c7; }
        .badge { background: #e2e8f0; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: normal; }

        /* MODAL (DETAY PENCERESİ) STİLLERİ */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--surface); padding: 25px; border-radius: 12px; width: 80%; max-width: 800px;
            max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }
        .close-modal { float: right; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: var(--secondary); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .history-box { border: 1px solid var(--border); padding: 15px; border-radius: 8px; background: #fafafa; }
        .history-list { max-height: 200px; overflow-y: auto; margin-top: 10px; background: white; border: 1px solid var(--border); border-radius: 6px; padding: 5px; }
        .history-item { padding: 6px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel">
            <h2 id="formTitle">Yeni Öğrenci Ekle</h2>
            <form id="studentForm">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Öğrenci Adı Soyadı</label>
                    <input type="text" id="adSoyad" required>
                </div>
                <div class="form-group">
                    <label>Ders</label>
                    <select id="ders">
                        <option>Matematik</option><option>Fizik</option><option>Kimya</option>
                        <option>Biyoloji</option><option>Türkçe</option><option>Tarih</option><option>Coğrafya</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sınıf & Okul</label>
                    <input type="text" id="okul" placeholder="Örn: 10. Sınıf - Atatürk Lisesi">
                </div>
                <div class="form-group">
                    <label>Veli Adı (Anne/Baba)</label>
                    <input type="text" id="veliAd">
                </div>
                <div class="form-group">
                    <label>Veli Telefonu</label>
                    <input type="number" id="veliTel" placeholder="5551234567" required>
                </div>
                <div class="form-group">
                    <label>Toplam Kurs Ücreti (₺)</label>
                    <input type="number" id="toplamUcret" value="0">
                </div>
                <button type="submit" id="submitBtn">Öğrenciyi Kaydet</button>
                <button type="button" id="cancelEditBtn" style="background-color: var(--secondary); margin-top:5px; display:none;" onclick="clearForm()">Düzenlemeyi İptal Et</button>
            </form>

            <div class="backup-section">
                <h2>Veri Yönetimi & Yedekleme</h2>
                <button type="button" class="btn-backup" onclick="exportBackup()">Verileri Yedekle (.json)</button>
                <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importBackup(event)">
                <button type="button" class="btn-restore" onclick="document.getElementById('importFile').click()">Yedekten Geri Yükle</button>
            </div>
        </div>

        <div class="panel">
            <h2>Öğrenci Listesi <span class="badge" id="studentCount">0 Öğrenci</span></h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Ad Soyad</th>
                            <th>Ders</th>
                            <th>Finansal Durum</th>
                            <th>Ders Geçmişi</th>
                            <th>İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h3 id="modalStudentName" style="margin-top: 0; color: var(--primary);">Öğrenci Detayı</h3>
            <p id="modalStudentInfo" style="color: var(--secondary); font-size:0.9rem;"></p>
            
            <div class="modal-grid">
                <div class="history-box">
                    <h4>🗓️ Ders Katılım Geçmişi</h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="logKatilimTarih">
                        <select id="logKatilimDurum" style="width: 120px;">
                            <option value="Geldi">Geldi</option>
                            <option value="Gelmedi">Gelmedi</option>
                        </select>
                        <button style="width: auto; padding:0 10px;" onclick="addAttendanceLog()">Ekle</button>
                    </div>
                    <div class="history-list" id="attendanceList"></div>
                </div>

                <div class="history-box">
                    <h4>💰 Ödeme Geçmişi</h4>
                    <div style="display: flex; gap: 5px;">
                        <input type="date" id="logOdemeTarih">
                        <input type="number" id="logOdemeMiktar" placeholder="Tutar ₺">
                        <button style="width: auto; padding:0 10px;" onclick="addPaymentLog()">Ekle</button>
                    </div>
                    <div class="history-list" id="paymentList"></div>
                </div>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button class="btn-pdf" style="width: auto;" id="modalPdfBtn">Kapsamlı PDF Raporu Üret</button>
            </div>
        </div>
    </div>

    <script>
        let students = JSON.parse(localStorage.getItem('kursOgrencileri')) || [];
        let activeStudentIndex = -1;

        const studentForm = document.getElementById('studentForm');
        const tableBody = document.getElementById('studentTableBody');
        const studentCountBadge = document.getElementById('studentCount');

        // Form Gönderimi (Ekleme veya Güncelleme)
        studentForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('editIndex').value);
            
            const studentData = {
                adSoyad: document.getElementById('adSoyad').value,
                ders: document.getElementById('ders').value,
                okul: document.getElementById('okul').value,
                veliAd: document.getElementById('veliAd').value,
                veliTel: document.getElementById('veliTel').value,
                toplamUcret: parseFloat(document.getElementById('toplamUcret').value) || 0,
                katilimlar: editIndex > -1 ? students[editIndex].katilimlar || [] : [],
                odemeler: editIndex > -1 ? students[editIndex].odemeler || [] : []
            };

            if (editIndex > -1) {
                students[editIndex] = studentData;
            } else {
                students.push(studentData);
            }

            saveData();
            renderTable();
            clearForm();
        });

        function saveData() { localStorage.setItem('kursOgrencileri', JSON.stringify(students)); }

        function clearForm() {
            studentForm.reset();
            document.getElementById('editIndex').value = "-1";
            document.getElementById('formTitle').textContent = "Yeni Öğrenci Ekle";
            document.getElementById('submitBtn').textContent = "Öğrenciyi Kaydet";
            document.getElementById('cancelEditBtn').style.display = "none";
        }

        // Düzenleme Modunu Tetikle
        function editStudent(index) {
            const student = students[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('adSoyad').value = student.adSoyad;
            document.getElementById('ders').value = student.ders;
            document.getElementById('okul').value = student.okul;
            document.getElementById('veliAd').value = student.veliAd;
            document.getElementById('veliTel').value = student.veliTel;
            document.getElementById('toplamUcret').value = student.toplamUcret;

            document.getElementById('formTitle').textContent = "Öğrenci Kaydını Düzenle";
            document.getElementById('submitBtn').textContent = "Değişiklikleri Kaydet";
            document.getElementById('cancelEditBtn').style.display = "block";
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        // Tabloyu Çizdirme
        function renderTable() {
            tableBody.innerHTML = '';
            studentCountBadge.textContent = `${students.length} Öğrenci`;
            
            if (students.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" style="text-align:center; color:var(--secondary); padding:30px;">Kayıtlı öğrenci yok.</td></tr>`;
                return;
            }

            students.forEach((student, index) => {
                const toplamOdenen = (student.odemeler || []).reduce((sum, item) => sum + item.miktar, 0);
                const bakiye = student.toplamUcret - toplamOdenen;
                const toplamDers = (student.katilimlar || []).length;
                const gelinenDers = (student.katilimlar || []).filter(k => k.durum === 'Geldi').length;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${student.adSoyad}</strong><br><small>${student.okul || '-'}</small></td>
                    <td><span class="badge">${student.ders}</span></td>
                    <td>Toplam: ${student.toplamUcret}₺<br>Kalan: <strong style="color:${bakiye > 0 ? 'var(--danger)' : 'var(--success)'}">${bakiye}₺</strong></td>
                    <td>Katılım: ${gelinenDers} / ${toplamDers}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-edit" onclick="editStudent(${index})">📝 Düzenle</button>
                            <button class="btn-detail" onclick="openModal(${index})">📊 Detay / Geçmiş</button>
                            <button class="btn-wp" onclick="sendWP(${index})">WP</button>
                            <button class="btn-sms" onclick="sendSMS(${index})">SMS</button>
                            <button class="btn-delete" onclick="deleteStudent(${index})">Sil</button>
                        </div>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // MODAL İŞLEMLERİ (GEÇMİŞ VE DETAY)
        function openModal(index) {
            activeStudentIndex = index;
            const student = students[index];
            document.getElementById('modalStudentName').textContent = `📊 ${student.adSoyad} - Detaylı Öğrenci Kartı`;
            document.getElementById('modalStudentInfo').textContent = `Veli: ${student.veliAd || '-'} (${student.veliTel}) | Okul: ${student.okul || '-'}`;
            
            // Tarih inputlarını bugüne ayarla
            const bugün = new Date().toISOString().slice(0,10);
            document.getElementById('logKatilimTarih').value = bugün;
            document.getElementById('logOdemeTarih').value = bugün;
            document.getElementById('logOdemeMiktar').value = '';

            renderModalLists();
            document.getElementById('modalPdfBtn').setAttribute('onclick', `generateAdvancedPDF(${index})`);
            document.getElementById('detailModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('detailModal').style.display = 'none'; }

        function renderModalLists() {
            const student = students[activeStudentIndex];
            
            // Katılım Geçmişi Listeleme
            const attList = document.getElementById('attendanceList');
            attList.innerHTML = '';
            (student.katilimlar || []).sort((a,b) => new Date(b.tarih) - new Date(a.tarih)).forEach((k, idx) => {
                attList.innerHTML += `<div class="history-item"><span>📅 ${k.tarih}</span><strong style="color:${k.durum === 'Geldi'?'var(--success)':'var(--danger)'}">${k.durum}</strong></div>`;
            });
            if((student.katilimlar || []).length === 0) attList.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:grey">Katılım kaydı yok.</div>';

            // Ödeme Geçmişi Listeleme
            const payList = document.getElementById('paymentList');
            payList.innerHTML = '';
            (student.odemeler || []).sort((a,b) => new Date(b.tarih) - new Date(a.tarih)).forEach((o, idx) => {
                payList.innerHTML += `<div class="history-item"><span>💰 ${o.tarih}</span><strong>${o.miktar} ₺</strong></div>`;
            });
            if((student.odemeler || []).length === 0) payList.innerHTML = '<div style="padding:10px;font-size:0.8rem;color:grey">Ödeme kaydı yok.</div>';
        }

        function addAttendanceLog() {
            const tarih = document.getElementById('logKatilimTarih').value;
            const durum = document.getElementById('logKatilimDurum').value;
            if(!tarih) return;
            if(!students[activeStudentIndex].katilimlar) students[activeStudentIndex].katilimlar = [];
            
            students[activeStudentIndex].katilimlar.push({ tarih, durum });
            saveData(); renderModalLists(); renderTable();
        }

        function addPaymentLog() {
            const tarih = document.getElementById('logOdemeTarih').value;
            const miktar = parseFloat(document.getElementById('logOdemeMiktar').value);
            if(!tarih || isNaN(miktar)) return;
            if(!students[activeStudentIndex].odemeler) students[activeStudentIndex].odemeler = [];
            
            students[activeStudentIndex].odemeler.push({ tarih, miktar });
            saveData(); renderModalLists(); renderTable();
            document.getElementById('logOdemeMiktar').value = '';
        }

        // İLETİŞİM MODÜLLERİ
        function sendWP(index) {
            const student = students[index];
            const toplamOdenen = (student.odemeler || []).reduce((sum, item) => sum + item.miktar, 0);
            const bakiye = student.toplamUcret - toplamOdenen;
            const mesaj = `Sayın ${student.veliAd},\n\nÖğrencimiz ${student.adSoyad}'ın kurs durumu:\nDers: ${student.ders}\nKalan Toplam Bakiye: ${bakiye} TL.\nDetaylı döküm için bizimle iletişime geçebilirsiniz.`;
            window.open(`https://wa.me/90${student.veliTel}?text=${encodeURIComponent(mesaj)}`, '_blank');
        }

        function sendSMS(index) {
            const student = students[index];
            const sortedKatilim = (student.katilimlar || []).sort((a,b) => new Date(b.tarih) - new Date(a.tarih));
            const sonDurum = sortedKatilim.length > 0 ? (sortedKatilim[0].durum === 'Geldi' ? 'katilmistir' : 'KATILMAMISTIR') : 'bilgisi girilmistir';
            const tarih = sortedKatilim.length > 0 ? sortedKatilim[0].tarih : new Date().toLocaleDateString('tr-TR');
            
            const mesaj = `Sayin Veli, ogrenciniz ${student.adSoyad} ${tarih} tarihindeki ${student.ders} dersine ${sonDurum}. Bilgilerinize.`;
            window.location.href = `sms:+90${student.veliTel}?body=${encodeURIComponent(mesaj)}`;
        }

        // KAPSAMLI PDF RAPORLAMA SİSTEMİ
        function generateAdvancedPDF(index) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const student = students[index];
            
            const toplamOdenen = (student.odemeler || []).reduce((sum, item) => sum + item.miktar, 0);
            const bakiye = student.toplamUcret - toplamOdenen;

            doc.setFont("helvetica");
            doc.setFontSize(20);
            doc.text("KURS OGRENCI HAREKET RAPORU", 105, 20, null, null, "center");
            
            doc.setFontSize(10);
            doc.text(`Rapor Tarihi: ${new Date().toLocaleDateString('tr-TR')}`, 20, 30);
            doc.line(20, 33, 190, 33);

            // Kimlik Kartı
            doc.setFontSize(12);
            doc.text(`Ogrenci Adi Soyadi: ${student.adSoyad}`, 20, 43);
            doc.text(`Brans / Ders: ${student.ders}`, 20, 50);
            doc.text(`Okul Bilgisi: ${student.okul || '-'}`, 20, 57);
            doc.text(`Veli Iletisim: ${student.veliAd || '-'} (${student.veliTel})`, 20, 64);
            
            doc.line(20, 70, 190, 70);

            // Finans Özeti Hesaplama
            doc.text(`Toplam Taahhut Edilen Ucret: ${student.toplamUcret} TL`, 20, 80);
            doc.text(`Toplam Tahsil Edilen Ucret: ${toplamOdenen} TL`, 20, 87);
            doc.text(`Kalan Guncel Borc / Bakiye: ${bakiye} TL`, 20, 94);

            doc.line(20, 100, 190, 100);

            // Ders Katılım Tablosu Yazımı
            doc.text("DERS KATILIM LISTESI", 20, 110);
            let y = 117;
            (student.katilimlar || []).sort((a,b) => new Date(a.tarih) - new Date(b.tarih)).forEach((k) => {
                if (y > 270) { doc.addPage(); y = 20; }
                doc.text(`- ${k.tarih} : ${k.durum}`, 25, y);
                y += 7;
            });

            // Ödeme Hareketleri Yazımı
            y += 5;
            if (y > 270) { doc.addPage(); y = 20; }
            doc.text("ODEME MAKBUZ HAREKETLERI", 20, y);
            y += 7;
            (student.odemeler || []).sort((a,b) => new Date(a.tarih) - new Date(b.tarih)).forEach((o) => {
                if (y > 270) { doc.addPage(); y = 20; }
                doc.text(`- ${o.tarih} Tarihinde Alinan: ${o.miktar} TL`, 25, y);
                y += 7;
            });

            doc.save(`${student.adSoyad.replace(/\s+/g, '_')}_Kapsamli_Rapor.pdf`);
        }

        function deleteStudent(index) {
            if(confirm('Bu ogrenciyi ve tum gecmisini silmek istediginize emin misiniz?')) {
                students.splice(index, 1); saveData(); renderTable();
            }
        }

        // YEDEKLERİ YÖNETME
        function exportBackup() {
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(JSON.stringify(students, null, 2));
            const link = document.createElement('a');
            link.setAttribute('href', dataUri);
            link.setAttribute('download', `kurs_otomasyon_kronolojik_yedek_${new Date().toISOString().slice(0,10)}.json`);
            link.click();
        }

        function importBackup(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    students = JSON.parse(e.target.result); saveData(); renderTable(); alert("Gelişmiş kronolojik yedek başarıyla yüklendi!");
                } catch(err) { alert("Hatalı dosya!"); }
            };
            reader.readAsText(file); event.target.value = '';
        }

        renderTable();
    </script>
</body>
</html>
